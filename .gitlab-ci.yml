stages:
  - deploy

deploy_production:
  stage: deploy
  only:
    - main
  before_script:
    - apt-get update -qq && apt-get install -y -qq openssh-client
    - eval $(ssh-agent -s)
    - chmod 400 $SSH_PRIVATE_KEY
    - ssh-add $SSH_PRIVATE_KEY
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - ssh-keyscan -H 172.31.60.144 >> ~/.ssh/known_hosts
  script:
    - ssh root@172.31.60.144 "
        cd /Bureau/Noctua/Noctua-AI &&
        git pull origin main &&
        npm install --production &&
        pm2 restart noctua || pm2 start . --name noctua
      "
  environment:
    name: production

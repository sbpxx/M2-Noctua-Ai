version: '3.8'

services:
  ollama:
    build:
      context: .
      dockerfile: Dockerfile.ollama
    container_name: noctua-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    restart: unless-stopped
    networks:
      - noctua-network

networks:
  noctua-network:
    driver: bridge

volumes:
  ollama-data:
    driver: local
